<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kalkulator Universitas Semarang</title>

<style>

body{
    font-family:Arial;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:320px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
    text-align:center;
}

h2{
    color:blue;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
    font-size:18px;
}

button{
    width:60px;
    height:45px;
    margin:5px;
    font-size:18px;
    cursor:pointer;
}

#hasil{
    margin-top:20px;
    font-size:22px;
    color:red;
    font-weight:bold;
}

</style>

</head>
<body>

<div class="container">

<h2>UNIVERSITAS SEMARANG</h2>

<h3>Kalkulator Sederhana</h3>

<input type="number" id="a" placeholder="Angka Pertama">

<input type="number" id="b" placeholder="Angka Kedua">

<br>

<button onclick="hitung('+')">+</button>

<button onclick="hitung('-')">-</button>

<button onclick="hitung('*')">×</button>

<button onclick="hitung('/')">÷</button>

<div id="hasil">Hasil = 0</div>

</div>

<script>

function hitung(operator){

let a=parseFloat(document.getElementById("a").value);

let b=parseFloat(document.getElementById("b").value);

let hasil=0;

if(operator=='+')
hasil=a+b;

else if(operator=='-')
hasil=a-b;

else if(operator=='*')
hasil=a*b;

else if(operator=='/')
hasil=a/b;

document.getElementById("hasil").innerHTML="Hasil = "+hasil;

}

</script>

</body>
</html>
